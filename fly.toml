# fly.toml app configuration file generated for osrp-bot on 2026-07-06T14:23:24Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'osrp-bot'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'osrp_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
